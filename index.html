<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Privado de Cuentas de Cobro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            @page { size: letter; margin: 0; }
            body { background-color: white !important; margin: 0; }
            .print\:hidden { display: none !important; }
            #document-paper {
                box-shadow: none !important;
                margin: 0 !important;
                width: 100% !important;
                height: 100vh !important;
                padding: 2.0cm !important;
            }
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        /* Toggle Switch Style */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const months = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

        const Icon = ({ name }) => {
            const icons = {
                printer: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
                building: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path></svg>,
                image: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>,
                download: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
                upload: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
                settings: <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const defaultLocales = [
                { id: 1, label: "Local 1", tenant: "", tenantId: "", coTenant: "", coTenantId: "", rent: 0, concept: "inmueble comercial", city: "", showOwner2: false, showCoTenant: false },
                { id: 2, label: "Local 2", tenant: "", tenantId: "", coTenant: "", coTenantId: "", rent: 0, concept: "inmueble comercial", city: "", showOwner2: false, showCoTenant: false },
                { id: 3, label: "Local 3", tenant: "", tenantId: "", coTenant: "", coTenantId: "", rent: 0, concept: "inmueble comercial", city: "", showOwner2: false, showCoTenant: false },
            ];

            const [ownerData, setOwnerData] = useState(() => {
                const saved = localStorage.getItem('invoice_owner_settings');
                return saved ? JSON.parse(saved) : { name: "NOMBRE ARRENDADOR 1", id: "CC. 00.000.000 de CIUDAD", name2: "", id2: "", bank: "BANCO - CUENTA" };
            });

            const [locales, setLocales] = useState(() => {
                const saved = localStorage.getItem('invoice_locales_data');
                return saved ? JSON.parse(saved) : defaultLocales;
            });

            const [signature, setSignature] = useState(() => localStorage.getItem('invoice_signature_img') || null);
            const [signature2, setSignature2] = useState(() => localStorage.getItem('invoice_signature2_img') || null);
            const [sigScale, setSigScale] = useState(() => parseInt(localStorage.getItem('invoice_sig_scale')) || 180);
            const [sigScale2, setSigScale2] = useState(() => parseInt(localStorage.getItem('invoice_sig_scale2')) || 180);
            const [activeIndex, setActiveIndex] = useState(0);
            const [currentDate, setCurrentDate] = useState({
                day: new Date().getDate(),
                month: new Date().toLocaleString('es-ES', { month: 'long' }).toUpperCase(),
                year: new Date().getFullYear()
            });

            // Persistencia
            useEffect(() => { localStorage.setItem('invoice_owner_settings', JSON.stringify(ownerData)); }, [ownerData]);
            useEffect(() => { localStorage.setItem('invoice_locales_data', JSON.stringify(locales)); }, [locales]);
            useEffect(() => { localStorage.setItem('invoice_sig_scale', sigScale.toString()); }, [sigScale]);
            useEffect(() => { localStorage.setItem('invoice_sig_scale2', sigScale2.toString()); }, [sigScale2]);
            useEffect(() => { 
                if (signature) localStorage.setItem('invoice_signature_img', signature); 
                else localStorage.removeItem('invoice_signature_img');
            }, [signature]);
            useEffect(() => { 
                if (signature2) localStorage.setItem('invoice_signature2_img', signature2); 
                else localStorage.removeItem('invoice_signature2_img');
            }, [signature2]);

            const activeLocal = locales[activeIndex];

            const numeroALetras = (num) => {
                const unidades = ['', 'un', 'dos', 'tres', 'cuatro', 'cinco', 'seis', 'siete', 'ocho', 'nueve'];
                const decenas = ['diez', 'once', 'doce', 'trece', 'catorce', 'quince', 'dieciséis', 'diecisiete', 'dieciocho', 'diecinueve'];
                const decenasMultiplos = ['', '', 'veinte', 'treinta', 'cuarenta', 'cincuenta', 'sesenta', 'setenta', 'ochenta', 'noventa'];
                const centenas = ['', 'ciento', 'doscientos', 'trescientos', 'cuatrocientos', 'quinientos', 'seiscientos', 'setecientos', 'ochocientos', 'novecientos'];

                function convertirGrupo(n) {
                    let output = '';
                    if (n === 100) return 'cien ';
                    if (n > 100) output += centenas[Math.floor(n / 100)] + ' ';
                    n %= 100;
                    if (n >= 10 && n < 20) output += decenas[n - 10] + ' ';
                    else {
                        if (n >= 20) {
                            if (n === 20) output += 'veinte ';
                            else if (n < 30) output += 'veinti' + unidades[n % 10] + ' ';
                            else output += decenasMultiplos[Math.floor(n / 10)] + (n % 10 !== 0 ? ' y ' + unidades[n % 10] : '') + ' ';
                        } else if (n > 0) output += unidades[n] + ' ';
                    }
                    return output;
                }

                if (num === 0) return 'cero';
                let millones = Math.floor(num / 1000000);
                let miles = Math.floor((num % 1000000) / 1000);
                let resto = num % 1000;
                let resultado = '';
                if (millones > 0) resultado += (millones === 1 ? 'Un millón ' : convertirGrupo(millones) + 'millones ');
                if (miles > 0) resultado += (miles === 1 ? 'mil ' : convertirGrupo(miles) + 'mil ');
                if (resto > 0) resultado += convertirGrupo(resto);
                return resultado.charAt(0).toUpperCase() + resultado.slice(1).trim();
            };

            const handleUpdateLocal = (field, value) => {
                const updated = [...locales];
                updated[activeIndex][field] = value;
                setLocales(updated);
            };

            const handleOwnerChange = (field, value) => setOwnerData({ ...ownerData, [field]: value });

            const exportData = () => {
                const data = { locales, signature, signature2, sigScale, sigScale2, ownerData };
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `backup_cobros.json`;
                link.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const data = JSON.parse(event.target.result);
                        if (data.locales) setLocales(data.locales);
                        if (data.signature) setSignature(data.signature);
                        if (data.signature2) setSignature2(data.signature2);
                        if (data.sigScale) setSigScale(data.sigScale);
                        if (data.sigScale2) setSigScale2(data.sigScale2);
                        if (data.ownerData) setOwnerData(data.ownerData);
                    };
                    reader.readAsText(file);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center print:bg-white print:p-0 text-slate-900">
                    
                    {/* PANEL DE CONTROL */}
                    <div className="w-full max-w-6xl bg-white shadow-xl rounded-3xl p-6 mb-8 border border-slate-200 print:hidden overflow-hidden">
                        <div className="flex flex-wrap justify-between items-center gap-4 mb-6 border-b pb-4">
                            <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <span className="bg-blue-600 p-1.5 rounded-lg text-white">🔐</span> Gestor Privado
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={exportData} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200">
                                    <Icon name="download" /> Exportar
                                </button>
                                <label className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200 cursor-pointer">
                                    <Icon name="upload" /> Importar
                                    <input type="file" accept=".json" onChange={importData} className="hidden" />
                                </label>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Sección 1: Arrendadores (Datos Globales) */}
                            <div className="space-y-4 bg-blue-50/50 p-4 rounded-2xl border border-blue-100 max-h-[400px] overflow-y-auto custom-scrollbar">
                                <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="settings" /> Datos de Arrendadores
                                </p>
                                <div className="space-y-2">
                                    <p className="text-[9px] font-bold text-blue-300 uppercase">Arrendador Principal</p>
                                    <input type="text" value={ownerData.name} onChange={(e) => handleOwnerChange('name', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-blue-200" placeholder="Nombre completo" />
                                    <input type="text" value={ownerData.id} onChange={(e) => handleOwnerChange('id', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-blue-200" placeholder="ID (CC/NIT) y Ciudad" />
                                </div>
                                <div className="space-y-2 pt-2 border-t border-blue-100">
                                    <p className="text-[9px] font-bold text-blue-300 uppercase">Segundo Arrendador</p>
                                    <input type="text" value={ownerData.name2 || ""} onChange={(e) => handleOwnerChange('name2', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-blue-200" placeholder="Nombre completo" />
                                    <input type="text" value={ownerData.id2 || ""} onChange={(e) => handleOwnerChange('id2', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-blue-200" placeholder="ID (CC/NIT) y Ciudad" />
                                </div>
                                <div className="space-y-2 pt-2 border-t border-blue-100">
                                    <p className="text-[9px] font-bold text-blue-300 uppercase">Cuenta Bancaria</p>
                                    <input type="text" value={ownerData.bank} onChange={(e) => handleOwnerChange('bank', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-blue-200" placeholder="Banco y Cuenta" />
                                </div>
                            </div>

                            {/* Sección 2: Configuración del Local Activo */}
                            <div className="space-y-4">
                                <div className="flex gap-1">
                                    {locales.map((l, idx) => (
                                        <button key={l.id} onClick={() => setActiveIndex(idx)} className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all ${activeIndex === idx ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                            L{l.id}
                                        </button>
                                    ))}
                                </div>
                                <div className="space-y-2 max-h-[330px] overflow-y-auto pr-2 custom-scrollbar">
                                    <div className="flex justify-between items-center bg-slate-50 p-2 rounded-xl border border-slate-100 mb-2">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Visibilidad en {activeLocal.label}</span>
                                        <div className="flex gap-4">
                                            <div className="flex items-center gap-2">
                                                <span className="text-[8px] font-bold">2do Arr'dor</span>
                                                <label className="switch">
                                                    <input type="checkbox" checked={activeLocal.showOwner2} onChange={(e) => handleUpdateLocal('showOwner2', e.target.checked)} />
                                                    <span className="slider"></span>
                                                </label>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-[8px] font-bold">2do Inq'lino</span>
                                                <label className="switch">
                                                    <input type="checkbox" checked={activeLocal.showCoTenant} onChange={(e) => handleUpdateLocal('showCoTenant', e.target.checked)} />
                                                    <span className="slider"></span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <p className="text-[9px] font-bold text-slate-400 uppercase">Arrendatario Principal</p>
                                    <input type="text" value={activeLocal.tenant} onChange={(e) => handleUpdateLocal('tenant', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-slate-200" placeholder="Nombre completo" />
                                    <input type="text" value={activeLocal.tenantId} onChange={(e) => handleUpdateLocal('tenantId', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-slate-200" placeholder="ID (CC/NIT) Principal" />
                                    
                                    {activeLocal.showCoTenant && (
                                        <div className="space-y-2 pt-2 border-t border-slate-100">
                                            <p className="text-[9px] font-bold text-slate-400 uppercase">Segundo Arrendatario</p>
                                            <input type="text" value={activeLocal.coTenant || ""} onChange={(e) => handleUpdateLocal('coTenant', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-slate-200" placeholder="Nombre completo" />
                                            <input type="text" value={activeLocal.coTenantId || ""} onChange={(e) => handleUpdateLocal('coTenantId', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-slate-200" placeholder="ID (CC/NIT)" />
                                        </div>
                                    )}

                                    <div className="flex gap-2 mt-2">
                                        <div className="flex-1">
                                            <p className="text-[9px] font-bold text-slate-400 uppercase">Canon</p>
                                            <input type="number" value={activeLocal.rent} onChange={(e) => handleUpdateLocal('rent', parseInt(e.target.value) || 0)} className="w-full p-2.5 text-sm rounded-xl border border-slate-200 font-bold text-blue-600" />
                                        </div>
                                        <div className="flex-1">
                                            <p className="text-[9px] font-bold text-slate-400 uppercase">Ciudad</p>
                                            <input type="text" value={activeLocal.city} onChange={(e) => handleUpdateLocal('city', e.target.value)} className="w-full p-2.5 text-sm rounded-xl border border-slate-200" placeholder="Ej: Valledupar" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Sección 3: Firmas y Fecha */}
                            <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                <div className="grid grid-cols-3 gap-1">
                                    <input type="number" value={currentDate.day} onChange={(e) => setCurrentDate({...currentDate, day: e.target.value})} className="p-2 border rounded-lg text-center text-sm font-bold" />
                                    <select value={currentDate.month} onChange={(e) => setCurrentDate({...currentDate, month: e.target.value})} className="p-2 border rounded-lg text-[10px] font-bold">
                                        {months.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <input type="number" value={currentDate.year} onChange={(e) => setCurrentDate({...currentDate, year: e.target.value})} className="p-2 border rounded-lg text-center text-sm font-bold" />
                                </div>
                                
                                <div className="space-y-3">
                                    <div className="bg-slate-50 p-3 rounded-xl">
                                        <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">Firma Arrendador 1</p>
                                        <label className="flex items-center justify-center gap-2 w-full p-2 bg-white text-slate-600 rounded-xl border-2 border-dashed border-slate-300 cursor-pointer text-xs font-bold shadow-sm">
                                            <Icon name="image" /> {signature ? 'CAMBIAR' : 'SUBIR'}
                                            <input type="file" accept="image/*" onChange={(e) => {
                                                const file = e.target.files[0];
                                                if (file) {
                                                    const reader = new FileReader();
                                                    reader.onloadend = () => setSignature(reader.result);
                                                    reader.readAsDataURL(file);
                                                }
                                            }} className="hidden" />
                                        </label>
                                        {signature && <input type="range" min="50" max="300" value={sigScale} onChange={(e) => setSigScale(e.target.value)} className="w-full h-1 mt-2 accent-blue-600 cursor-pointer" />}
                                    </div>

                                    <div className="bg-slate-50 p-3 rounded-xl">
                                        <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">Firma Arrendador 2</p>
                                        <label className="flex items-center justify-center gap-2 w-full p-2 bg-white text-slate-600 rounded-xl border-2 border-dashed border-slate-300 cursor-pointer text-xs font-bold shadow-sm">
                                            <Icon name="image" /> {signature2 ? 'CAMBIAR' : 'SUBIR'}
                                            <input type="file" accept="image/*" onChange={(e) => {
                                                const file = e.target.files[0];
                                                if (file) {
                                                    const reader = new FileReader();
                                                    reader.onloadend = () => setSignature2(reader.result);
                                                    reader.readAsDataURL(file);
                                                }
                                            }} className="hidden" />
                                        </label>
                                        {signature2 && <input type="range" min="50" max="300" value={sigScale2} onChange={(e) => setSigScale2(e.target.value)} className="w-full h-1 mt-2 accent-blue-600 cursor-pointer" />}
                                    </div>
                                </div>

                                <button onClick={() => window.print()} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-black transition-all shadow-lg active:scale-95">
                                    <Icon name="printer" /> IMPRIMIR PDF
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* HOJA TAMAÑO CARTA (LETTER) */}
                    <div id="document-paper" className="w-[21.59cm] min-h-[27.94cm] bg-white shadow-2xl p-[2cm] flex flex-col items-center text-slate-900 print:shadow-none print:m-0 print:w-full overflow-hidden">
                        <div className="text-center mb-8 w-full">
                            <h2 className="text-lg font-bold mb-8 tracking-[0.2em] border-b-2 border-slate-100 pb-4 uppercase">CUENTA DE COBRO</h2>
                            <div className="font-bold space-y-3 mb-6">
                                <div className="space-y-1">
                                    <p className="uppercase text-lg leading-tight">{activeLocal.tenant || "NOMBRE ARRENDATARIO"}</p>
                                    <p className="text-sm font-normal text-slate-500 italic">{activeLocal.tenantId || "Documento"}</p>
                                </div>
                                {activeLocal.showCoTenant && activeLocal.coTenant && (
                                    <div className="space-y-1 border-t border-slate-50 pt-2">
                                        <p className="uppercase text-lg leading-tight">{activeLocal.coTenant}</p>
                                        <p className="text-sm font-normal text-slate-500 italic">{activeLocal.coTenantId}</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="w-full space-y-6 flex-grow">
                            <div className="text-center space-y-3">
                                <p className="font-bold text-[10px] text-slate-400 uppercase tracking-widest">Debe a:</p>
                                <div className="space-y-4">
                                    <div>
                                        <p className="uppercase text-lg font-bold leading-tight">{ownerData.name}</p>
                                        <p className="text-sm text-slate-600">{ownerData.id}</p>
                                    </div>
                                    {activeLocal.showOwner2 && ownerData.name2 && (
                                        <div>
                                            <p className="uppercase text-lg font-bold leading-tight">{ownerData.name2}</p>
                                            <p className="text-sm text-slate-600">{ownerData.id2}</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="text-center space-y-3">
                                <p className="font-bold text-[10px] text-slate-400 uppercase tracking-widest">La suma de:</p>
                                <div>
                                    <p className="font-bold text-lg leading-tight">{numeroALetras(activeLocal.rent)} Pesos/ MCTE</p>
                                    <p className="font-bold text-xl">(${activeLocal.rent.toLocaleString('es-CO')})</p>
                                    <p className="text-sm mt-3 italic text-slate-500">Por concepto de:</p>
                                </div>
                            </div>

                            <div className="text-justify leading-relaxed text-lg px-8">
                                <p>Pago de servicio de arriendo correspondiente al periodo de <span className="font-bold">{currentDate.month}</span> del <span className="font-bold">{currentDate.year}</span> de acuerdo con el contrato de arrendamiento para <span className="underline decoration-slate-300">{activeLocal.concept}</span> firmado entre las partes.</p>
                            </div>

                            <div className="px-8 mt-4">
                                <p className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-slate-800 text-center">Por favor consignar en la <span className="font-bold">{ownerData.bank}</span> a mi nombre.</p>
                            </div>

                            <div className="mt-6 text-sm px-8 font-bold text-slate-400 uppercase tracking-widest">
                                <p>{activeLocal.city || "Ciudad"}, {currentDate.day} de {currentDate.month} del {currentDate.year}</p>
                            </div>
                        </div>

                        {/* Firmas lado a lado o centrada */}
                        <div className={`mt-10 flex w-full justify-center ${(activeLocal.showOwner2 && signature2) ? 'gap-12' : ''}`}>
                            {/* Firma 1 siempre visible */}
                            <div className={`flex flex-col items-center flex-1 ${(activeLocal.showOwner2 && ownerData.name2) ? 'max-w-[40%]' : 'max-w-[50%]'}`}>
                                <div className="h-28 flex items-end justify-center mb-2 overflow-hidden">
                                    {signature ? <img src={signature} style={{ width: `${sigScale}px` }} className="max-h-28 object-contain mix-blend-multiply" /> : <div className="text-slate-100 border border-dashed border-slate-100 p-4 rounded text-[8px] uppercase">Firma 1</div>}
                                </div>
                                <div className="border-t-2 border-slate-800 w-full pt-3 text-center">
                                    <p className="font-bold uppercase text-[12px] tracking-tighter leading-none mb-1">{ownerData.name}</p>
                                    <p className="text-[9px] text-slate-500 font-bold uppercase">{ownerData.id}</p>
                                </div>
                            </div>

                            {/* Firma 2 sujeta a toggle */}
                            {activeLocal.showOwner2 && ownerData.name2 && (
                                <div className="flex flex-col items-center flex-1 max-w-[40%]">
                                    <div className="h-28 flex items-end justify-center mb-2 overflow-hidden">
                                        {signature2 ? <img src={signature2} style={{ width: `${sigScale2}px` }} className="max-h-28 object-contain mix-blend-multiply" /> : <div className="text-slate-100 border border-dashed border-slate-100 p-4 rounded text-[8px] uppercase">Firma 2</div>}
                                    </div>
                                    <div className="border-t-2 border-slate-800 w-full pt-3 text-center">
                                        <p className="font-bold uppercase text-[12px] tracking-tighter leading-none mb-1">{ownerData.name2}</p>
                                        <p className="text-[9px] text-slate-500 font-bold uppercase">{ownerData.id2}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
